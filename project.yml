name: Scribe
options:
  bundleIdPrefix: com.scribe
  deploymentTarget:
    iOS: "18.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "2"
    SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ENABLE_PREVIEWS: true
    SWIFT_STRICT_CONCURRENCY: targeted

targets:
  Scribe:
    type: application
    platform: iOS
    sources:
      - path: Scribe
        excludes:
          - "**/*.metal"
          - "**/Info.plist"
      - path: Scribe
        includes:
          - "**/*.metal"
        buildPhase: sources
        compilerFlags: ""
    resources:
      - path: Scribe/Resources
        optional: true
      - path: Scribe/App/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scribe.app
        PRODUCT_NAME: Scribe
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Scribe/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: Scribe/App/Scribe.entitlements
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        PROVISIONING_PROFILE_SPECIFIER: ""
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"
        Release:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"
    info:
      path: Scribe/App/Info.plist
      properties:
        CFBundleDisplayName: Scribe
        CFBundleName: Scribe
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportsDocumentBrowser: true
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
    entitlements:
      path: Scribe/App/Scribe.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.scribe.app

  ScribeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/UnitTests
    dependencies:
      - target: Scribe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scribe.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Scribe.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Scribe"
        BUNDLE_LOADER: "$(TEST_HOST)"

  ScribeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/UITests
    dependencies:
      - target: Scribe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scribe.uitests
